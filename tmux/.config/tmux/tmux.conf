# tmux.conf — M1 Mac + Neovim + iTerm2

# --- Prefix: Ctrl+A ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# --- General ---
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g bell-action none
set -g set-titles on
set -g set-titles-string "#T - tmux"
setw -g automatic-rename on

# --- Terminal / color ---
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc"

# Instant escape — critical for Neovim responsiveness
set -sg escape-time 10

# Scope keyboard enhancement modes (Kitty protocol / modifyOtherKeys) per-pane.
# Without this, Neovim's terminal state bleeds into other panes after switching.
set -g extended-keys always

# Register iTerm2 bracketed paste capability — xterm-256color terminfo on macOS
# lacks smBP/rmBP entries, so tmux can't detect it from terminfo alone.
set -sa terminal-overrides ',xterm-256color:smBP=\e[?2004h:rmBP=\e[?2004l'

# --- Vim-aware pane navigation (vim-tmux-navigator) ---
# When Neovim is active: C-h/j/k/l pass through to Neovim
# (handles both pane nav AND completion C-j/C-k inside Neovim)
# When anything else is active: tmux switches panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# --- Splits (inherit cwd) ---
bind '|' split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind '_' split-window -v -c "#{pane_current_path}"

# New windows also inherit cwd
bind c new-window -c "#{pane_current_path}"

# --- Resize panes: Alt + arrow ---
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# --- Copy mode (vi) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Status bar ---
set -g status on
set -g status-style bg=colour234,fg=colour136
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[fg=green]#S #[fg=cyan]"
set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M #[fg=green] #h"

setw -g window-status-current-style bg=colour33,fg=colour231
setw -g window-status-style bg=colour235,fg=colour136

# --- Pane borders ---
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour51
